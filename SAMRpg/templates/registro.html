{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="glass-card p-4">
            <h2 class="h4 mb-4 border-bottom pb-2" style="border-color: var(--glass-border) !important;">Registro Multimodal (Módulo 1)</h2>
            <form>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label text-light opacity-75">Nombres</label>
                        <input type="text" class="form-control bg-transparent text-light border-secondary" placeholder="Ej. Juan">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label text-light opacity-75">Apellidos</label>
                        <input type="text" class="form-control bg-transparent text-light border-secondary" placeholder="Ej. Pérez">
                    </div>
                    <div class="col-12">
                        <label class="form-label text-light opacity-75">Correo Electrónico</label>
                        <input type="email" class="form-control bg-transparent text-light border-secondary" placeholder="juan@ejemplo.com">
                    </div>
                    <div class="col-12">
                        <div class="form-check mt-3">
                            <input class="form-check-input" type="checkbox" id="lopdp" required>
                            <label class="form-check-label text-light opacity-75" for="lopdp">
                                Acepto los términos de uso y la Ley Orgánica de Protección de Datos Personales (LOPDP).
                            </label>
                        </div>
                    </div>
                    <div class="col-12 mt-4 text-end">
                        <button type="button" class="btn btn-primary px-4 rounded-pill" style="background: var(--accent-color); border: none;">Completar Registro</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
