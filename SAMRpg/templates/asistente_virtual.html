{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center h-100">
    <div class="col-lg-10 col-xl-8 d-flex flex-column" style="height: calc(100vh - 150px);">
        <div class="glass-card d-flex flex-column h-100 overflow-hidden">
            <!-- Header -->
            <div class="p-4 border-bottom" style="background: rgba(255, 255, 255, 0.03); border-color: var(--glass-border) !important;">
                <h2 class="h4 m-0 d-flex align-items-center text-gradient">
                    <i class="bi bi-robot text-accent me-3"></i> Asistente Virtual SAMR-IA
                </h2>
                <p class="text-secondary small mb-0 mt-2">Usa el micrófono o el teclado para consultar tus síntomas.</p>
            </div>
            
            <!-- Messages Area -->
            <div class="chat-messages flex-grow-1 p-4" id="chat-messages" style="overflow-y: auto; display: flex; flex-direction: column; gap: 15px;">
                <div class="message bot">
                    Hola, soy SAMR-IA. Estoy listo para ayudarte con tu triaje o consultas médicas. ¿Cuáles son tus síntomas hoy?
                </div>
            </div>
            
            <!-- Input Area -->
            <div class="p-4 border-top" style="background: rgba(0, 0, 0, 0.2); border-color: var(--glass-border) !important;">
                <div class="d-flex gap-3 align-items-center w-100">
                    <button type="button" id="mic-btn" class="btn btn-secondary rounded-circle d-flex align-items-center justify-content-center flex-shrink-0" style="width: 55px; height: 55px; transition: all 0.3s;" title="Hablar por micrófono">
                        <i class="bi bi-mic-fill fs-4"></i>
                    </button>
                    <input type="text" id="chat-input" class="form-control form-control-lg form-control-custom flex-grow-1 rounded-pill px-4" placeholder="Escribe tu mensaje aquí..." style="height: 55px; font-size: 1.1rem; background: rgba(255,255,255,0.05); color: white; border: 1px solid var(--glass-border);">
                    <button type="button" id="send-msg" class="btn btn-premium rounded-circle d-flex align-items-center justify-content-center flex-shrink-0" style="width: 55px; height: 55px;">
                        <i class="bi bi-send-fill fs-4"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
/* Ensure messages look correct in the full width panel */
.message {
    max-width: 80%;
    padding: 14px 20px;
    border-radius: 18px;
    font-size: 1.05rem;
    line-height: 1.5;
    animation: fadeIn 0.3s ease forwards;
    width: fit-content;
}
.message.bot {
    background: rgba(255, 255, 255, 0.08);
    align-self: flex-start;
    border-bottom-left-radius: 4px;
}
.message.user {
    background: var(--accent-color);
    align-self: flex-end;
    border-bottom-right-radius: 4px;
    box-shadow: 0 4px 10px var(--accent-glow);
    color: white;
}
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}
/* Style mic button when recording */
#mic-btn[style*="color: red"] {
    background-color: rgba(239, 68, 68, 0.2) !important;
    border: 1px solid red;
    animation: pulse 1s infinite alternate;
}
@keyframes pulse {
    from { transform: scale(1); }
    to { transform: scale(1.05); }
}
</style>
{% endblock %}
