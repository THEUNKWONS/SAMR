{% extends 'base.html' %}

{% block content_public %}
<div class="glass-card p-4 p-md-5">
    <h2 class="h5 mb-4 text-center">Registro de Usuario</h2>
    
    <form method="post" action="{% url 'registro_paciente' %}">
        {% csrf_token %}
        <div class="row g-3">
            <div class="col-12 mb-2">
                <label class="form-label text-sm text-secondary">Tipo de Usuario</label>
                <select name="tipo_usuario" id="tipo_usuario" class="form-control-custom w-100 bg-transparent text-light border-secondary" required onchange="toggleFamiliarFields()">
                    <option value="PACIENTE" class="text-dark">Soy Paciente</option>
                    <option value="FAMILIAR" class="text-dark">Soy Familiar / Cuidador</option>
                    <option value="MEDICO_ESPECIALISTA" class="text-dark">Soy Médico Especialista</option>
                </select>
            </div>
            
            <div class="col-md-6">
                <label class="form-label text-sm text-secondary">Nombres</label>
                <input type="text" name="nombres" class="form-control-custom w-100" required>
            </div>
            <div class="col-md-6">
                <label class="form-label text-sm text-secondary">Apellidos</label>
                <input type="text" name="apellidos" class="form-control-custom w-100" required>
            </div>
            <div class="col-md-6">
                <label class="form-label text-sm text-secondary">Cédula / DNI</label>
                <input type="text" name="dni" class="form-control-custom w-100" required>
            </div>
            <div class="col-md-6">
                <label class="form-label text-sm text-secondary">Teléfono</label>
                <input type="tel" name="telefono_principal" class="form-control-custom w-100" required>
            </div>
            
            <div class="col-md-6">
                <label class="form-label text-sm text-secondary">Fecha de Nacimiento</label>
                <input type="date" name="fecha_nacimiento" class="form-control-custom w-100" required>
            </div>
            
            <div class="col-12">
                <label class="form-label text-sm text-secondary">Correo Electrónico (Será tu usuario)</label>
                <input type="email" name="email" class="form-control-custom w-100" required>
            </div>
            <div class="col-md-6">
                <label class="form-label text-sm text-secondary">Contraseña Segura</label>
                <input type="password" name="password" class="form-control-custom w-100" required minlength="6">
            </div>
            <div class="col-md-6">
                <label class="form-label text-sm text-secondary">Confirmar Contraseña</label>
                <input type="password" name="password_confirm" class="form-control-custom w-100" required minlength="6">
            </div>

            <!-- Campo para Pacientes -->
            <div class="col-12" id="campo_alergias">
                <label class="form-label text-sm text-danger">Alergias Conocidas (Escribe 'Ninguna' si no tienes)</label>
                <textarea name="alergias" id="input_alergias" class="form-control-custom w-100" rows="2" placeholder="Describa sus alergias médicas aquí..."></textarea>
            </div>

            
            <!-- Campo oculto para Familiares -->
            <div class="col-12" id="campo_cedula_paciente" style="display: none;">
                <label class="form-label text-sm text-warning">Cédula del Paciente a Vincular (El paciente deberá aprobar tu solicitud)</label>
                <input type="text" name="cedula_paciente_asociado" id="input_cedula_paciente" class="form-control-custom w-100" placeholder="Ej. 1720...">
            </div>

            <!-- Campos para Médicos Especialistas -->
            <div class="col-md-6" id="campo_especialidad" style="display: none;">
                <label class="form-label text-sm text-info">Especialidad</label>
                {{ form.especialidad }}
                <script>
                    // Asegurar que las opciones sean legibles en el dropdown transparente
                    document.addEventListener("DOMContentLoaded", function() {
                        const select = document.getElementById('input_especialidad');
                        if(select) {
                            for(let i=0; i<select.options.length; i++){
                                select.options[i].classList.add('text-dark');
                            }
                        }
                    });
                </script>
            </div>
            <div class="col-md-6" id="campo_registro_prof" style="display: none;">
                <label class="form-label text-sm text-info">Registro Profesional</label>
                <input type="text" name="registro_profesional" id="input_registro_prof" class="form-control-custom w-100" placeholder="Nro de registro médico">
            </div>
        </div>
        
        <button type="submit" class="btn-premium w-100 mt-4 mb-3">Completar Registro</button>
        
        <div class="text-center text-sm">
            <span class="text-secondary">¿Ya tienes cuenta?</span> 
            <a href="{% url 'login' %}" class="text-accent text-decoration-none fw-medium" style="color: var(--accent-color);">Inicia Sesión</a>
        </div>
    </form>
</div>

<script>
function toggleFamiliarFields() {
    var tipo = document.getElementById('tipo_usuario').value;
    var campoCedula = document.getElementById('campo_cedula_paciente');
    var inputCedula = document.getElementById('input_cedula_paciente');
    var campoAlergias = document.getElementById('campo_alergias');
    var inputAlergias = document.getElementById('input_alergias');
    var campoEspecialidad = document.getElementById('campo_especialidad');
    var inputEspecialidad = document.getElementById('input_especialidad');
    var campoRegistroProf = document.getElementById('campo_registro_prof');
    var inputRegistroProf = document.getElementById('input_registro_prof');
    
    // Ocultar todos por defecto
    campoCedula.style.display = 'none';
    inputCedula.required = false;
    campoAlergias.style.display = 'none';
    inputAlergias.required = false;
    campoEspecialidad.style.display = 'none';
    inputEspecialidad.required = false;
    campoRegistroProf.style.display = 'none';
    inputRegistroProf.required = false;

    if (tipo === 'FAMILIAR') {
        campoCedula.style.display = 'block';
        inputCedula.required = true;
    } else if (tipo === 'PACIENTE') {
        campoAlergias.style.display = 'block';
        inputAlergias.required = true;
    } else if (tipo === 'MEDICO_ESPECIALISTA') {
        campoEspecialidad.style.display = 'block';
        inputEspecialidad.required = true;
        campoRegistroProf.style.display = 'block';
        inputRegistroProf.required = true;
    }
}
// Init state
document.addEventListener('DOMContentLoaded', toggleFamiliarFields);
</script>
{% endblock %}
