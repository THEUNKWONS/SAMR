{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="row h-100 align-items-stretch" style="min-height: calc(100vh - 160px);">
    <div class="col-12">
        <div class="glass-card h-100 d-flex flex-column" style="overflow: hidden;">
            <div class="chat-header p-4 border-bottom border-secondary d-flex align-items-center bg-dark bg-opacity-50">
                <div class="avatar-circle bg-accent text-white me-3 d-flex align-items-center justify-content-center" style="width: 48px; height: 48px; border-radius: 50%;">
                    <i class="bi bi-robot fs-4"></i>
                </div>
                <div>
                    <h4 class="mb-0 fw-bold text-white">SAMR-IA Asistente</h4>
                    <small class="text-success"><i class="bi bi-circle-fill me-1" style="font-size: 8px;"></i>En línea y listo para ayudarte</small>
                </div>
            </div>
            
            <div id="chat-messages" class="flex-grow-1 p-4" style="overflow-y: auto; background: rgba(0,0,0,0.2);">
                <!-- Mensaje de bienvenida inicial (se carga estáticamente) -->
                <div class="message bot mb-4">
                    <div class="d-flex align-items-start">
                        <div class="avatar-circle bg-accent text-white me-2 mt-1 d-flex align-items-center justify-content-center flex-shrink-0" style="width: 32px; height: 32px; border-radius: 50%;">
                            <i class="bi bi-robot fs-6"></i>
                        </div>
                        <div class="p-3 rounded-4 bg-dark bg-opacity-75 text-white" style="border-top-left-radius: 0 !important; max-width: 80%;">
                            Hola, soy el asistente virtual de SAMR. ¿En qué te puedo ayudar hoy? Por favor describe tus síntomas o indica si es una emergencia.
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="p-4 bg-dark bg-opacity-50 border-top border-secondary">
                <div class="input-group input-group-lg">
                    <button class="btn btn-outline-secondary border-end-0 text-light" type="button" id="mic-btn" title="Hablar por voz" style="background: rgba(255,255,255,0.05);">
                        <i class="bi bi-mic-fill"></i>
                    </button>
                    <input type="text" id="chat-input" class="form-control border-start-0 border-end-0 text-white shadow-none" placeholder="Escribe tu mensaje..." autocomplete="off" style="background: rgba(255,255,255,0.05); border-color: #6c757d;">
                    <button class="btn btn-accent px-4" type="button" id="send-msg" style="background-color: var(--accent-color); color: white; border-color: var(--accent-color);">
                        <i class="bi bi-send-fill me-2"></i> Enviar
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    /* Estilos específicos para la vista de chat a pantalla completa que complementan styles.css */
    .message {
        margin-bottom: 1rem;
        max-width: 100%;
        padding: 0;
        background: transparent;
        box-shadow: none;
    }
    .message.user .d-flex {
        flex-direction: row-reverse;
    }
    .message.user .avatar-circle {
        margin-right: 0 !important;
        margin-left: 0.5rem !important;
        background-color: #6c757d !important;
    }
    .message.user .bg-dark {
        background-color: var(--accent-color) !important;
        border-top-right-radius: 0 !important;
        border-top-left-radius: 1rem !important;
    }
</style>
{% endblock %}
